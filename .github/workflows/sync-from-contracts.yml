name: Sync from contracts

# Updates version-manifest.json's oesis-contracts.last_verified_commit so the
# governance hub always tracks the latest validated contracts release.

on:
  repository_dispatch:
    types: [contracts-updated]
  workflow_dispatch:
    inputs:
      contracts_sha:
        description: 'Contracts SHA to stamp (defaults to HEAD of lumenaut-llc/oesis-contracts main)'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout self
        uses: actions/checkout@v4

      - name: Resolve contracts SHA
        id: cref
        shell: bash
        run: |
          sha="${{ github.event.client_payload.contracts_sha || inputs.contracts_sha }}"
          if [ -z "$sha" ]; then
            sha=$(git ls-remote https://github.com/lumenaut-llc/oesis-contracts.git HEAD | awk '{print $1}')
          fi
          echo "sha=$sha" >> "$GITHUB_OUTPUT"
          echo "short=${sha:0:12}" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run sync
        shell: bash
        run: |
          set -euo pipefail
          python3 scripts/repo_split.py sync-specs-refs \
            --specs-root . \
            --contracts-ref "${{ steps.cref.outputs.sha }}" \
            --json | tee sync-summary.json

      - name: Open PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: sync/contracts-${{ steps.cref.outputs.short }}
          commit-message: "chore(sync): contracts @ ${{ steps.cref.outputs.short }}"
          title: "chore(sync): contracts @ ${{ steps.cref.outputs.short }}"
          body: |
            Automated update of `version-manifest.json` to record
            [oesis-contracts@${{ steps.cref.outputs.short }}](https://github.com/lumenaut-llc/oesis-contracts/commit/${{ steps.cref.outputs.sha }})
            as the latest verified contracts commit.

            Generated by `.github/workflows/sync-from-contracts.yml`.
          labels: |
            automated
            contracts-sync
          delete-branch: true
          add-paths: |
            version-manifest.json
            sync-summary.json
